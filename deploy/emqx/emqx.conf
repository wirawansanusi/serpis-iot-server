## EMQX 5 config for the Serpis IR blaster fleet.
##
## Replaces Mosquitto to get PER-DEVICE auth: every device authenticates with its
## own credential (username = public_device_id, password = HMAC of its claim
## secret) and is scoped by ACL to ONLY its own serpis/ir/<pubid>/* topics. Both
## checks are delegated to serpis-iot-server over the internal Docker network:
##   authn -> POST http://serpis-iot-server:3000/api/mqtt/auth
##   authz -> POST http://serpis-iot-server:3000/api/mqtt/acl
## The backend's own mqtt.js client logs in with MQTT_USERNAME/MQTT_PASSWORD and is
## returned is_superuser=true, so it bypasses ACL (subscribes serpis/ir/+/evt etc).
##
## SECURITY: replace REPLACE_WITH_MQTT_AUTH_HOOK_SECRET below with the same value
## you set for MQTT_AUTH_HOOK_SECRET in the server .env. EMQX sends it on every
## hook call so the auth endpoints can reject anything that isn't the broker.

node {
  name = "emqx@127.0.0.1"
  cookie = "REPLACE_WITH_RANDOM_COOKIE"
  data_dir = "/opt/emqx/data"
}

## Listeners ------------------------------------------------------------------
## 8883 TLS — devices reach this from the internet (published in compose).
## 1883 TCP — internal only (the backend mqtt.js client); NOT published.
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  ssl_options {
    certfile = "/opt/emqx/etc/certs/fullchain.pem"   # mqtt.serpis.id LE cert
    keyfile  = "/opt/emqx/etc/certs/privkey.pem"
  }
}
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}

## Authentication (per-device, via the backend HTTP hook) ---------------------
authentication = [
  {
    mechanism = password_based
    backend = http
    enable = true
    method = post
    url = "http://serpis-iot-server:3000/api/mqtt/auth"
    headers {
      "content-type" = "application/json"
      "x-auth-hook-secret" = "REPLACE_WITH_MQTT_AUTH_HOOK_SECRET"
    }
    body {
      username = "${username}"
      password = "${password}"
      clientid = "${clientid}"
    }
  }
]

## Authorization (per-device topic ACL, via the backend HTTP hook) ------------
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = http
      enable = true
      method = post
      url = "http://serpis-iot-server:3000/api/mqtt/acl"
      headers {
        "content-type" = "application/json"
        "x-auth-hook-secret" = "REPLACE_WITH_MQTT_AUTH_HOOK_SECRET"
      }
      body {
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
    }
  ]
}
