# Server-side compose for serpis-iot-server. Copy this (and a populated .env) to
# /opt/serpis-iot-server on the VPS. The image is pulled from GHCR by CI/CD.
#
# serpis-iot-server joins the SAME external Docker network as serpis's Caddy so Caddy
# can reverse-proxy to it by container name. No published ports — Caddy is the
# only ingress.

services:
  app:
    image: ghcr.io/wirawansanusi/serpis-iot-server:latest
    container_name: serpis-iot-server
    restart: unless-stopped
    env_file:
      - .env            # runtime secrets — see .env.server.example (never committed)
    expose:
      - "3000"          # internal to the Docker network; not published to the host
    networks:
      - web

  # MQTT broker for the IR blaster fleet (EMQX — PER-DEVICE auth via serpis-iot-server
  # HTTP hooks; see emqx/README.md). Devices connect over TLS (8883, published);
  # serpis-iot-server connects plaintext over the internal network as the superuser
  # (MQTT_URL=mqtt://serpis-mqtt:1883). EMQX reaches the backend by container name
  # (serpis-iot-server:3000), so both share the `web` network. The service keeps the
  # name serpis-mqtt so MQTT_URL is unchanged from the Mosquitto setup.
  mosquitto:
    image: emqx/emqx:5.8
    container_name: serpis-mqtt
    hostname: serpis-mqtt
    restart: unless-stopped
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_LISTENERS__WS__DEFAULT__ENABLE: "false"
      EMQX_LISTENERS__WSS__DEFAULT__ENABLE: "false"
    ports:
      - "8883:8883"     # TLS listener — devices reach it from the internet
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./emqx/certs:/opt/emqx/etc/certs:ro   # fullchain.pem + privkey.pem for mqtt.serpis.id
      - ./emqx/data:/opt/emqx/data
    networks:
      - web

networks:
  web:
    external: true
    # CHANGE THIS to the network serpis's Caddy container is attached to. Find it:
    #   docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' <caddy-container>
    name: web
