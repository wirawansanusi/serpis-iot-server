name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

env:
  IMAGE: ghcr.io/wirawansanusi/humid-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Only NEXT_PUBLIC_* is baked into the client bundle. Server secrets
          # (SUPABASE_*, INGEST_TOKEN, CLAIM_SECRET_ENC_KEY, CLERK_SECRET_KEY)
          # are provided at runtime via the server .env, not here.
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u wirawansanusi --password-stdin
            cd /opt/humid-server
            docker compose pull app
            docker compose up -d app
            docker image prune -f
