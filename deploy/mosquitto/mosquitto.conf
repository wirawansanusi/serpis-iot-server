# Mosquitto config for the Serpis IR fleet.
#
# Two listeners:
#   1883  plaintext, INTERNAL to the Docker network only (NOT published in
#         docker-compose). serpis-iot-server connects here: MQTT_URL=mqtt://serpis-mqtt:1883
#   8883  TLS, PUBLISHED to the internet. IR blaster devices connect here using
#         the Let's Encrypt cert for mqtt.serpis.id (so the firmware's bundled
#         LE roots validate it — see src/tls_client.cpp).
#
# All clients must authenticate (password_file). For v1 the fleet shares one
# device account; topics are namespaced per device by public_device_id. Harden
# to per-device credentials later (see the project plan).

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice

allow_anonymous false
password_file /mosquitto/config/passwd

listener 1883 0.0.0.0

listener 8883 0.0.0.0
# Mount the live Let's Encrypt directory for mqtt.serpis.id read-only at
# /mosquitto/certs (see docker-compose.yml + README.md).
certfile /mosquitto/certs/fullchain.pem
keyfile  /mosquitto/certs/privkey.pem
