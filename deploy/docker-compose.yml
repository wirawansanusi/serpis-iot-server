# Server-side compose for humid-server. Copy this (and a populated .env) to
# /opt/serpis-iot-server on the VPS. The image is pulled from GHCR by CI/CD.
#
# humid-server joins the SAME external Docker network as serpis's Caddy so Caddy
# can reverse-proxy to it by container name. No published ports — Caddy is the
# only ingress.

services:
  app:
    image: ghcr.io/wirawansanusi/serpis-iot-server:latest
    container_name: humid-server
    restart: unless-stopped
    env_file:
      - .env            # runtime secrets — see .env.server.example (never committed)
    expose:
      - "3000"          # internal to the Docker network; not published to the host
    networks:
      - web

  # MQTT broker for the IR blaster fleet. Devices connect over TLS (8883,
  # published); humid-server connects plaintext over the internal network
  # (mqtt://serpis-mqtt:1883). See mosquitto/README.md for cert + password setup.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: serpis-mqtt
    restart: unless-stopped
    ports:
      - "8883:8883"     # TLS listener — devices reach it from the internet
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/certs:/mosquitto/certs:ro   # fullchain.pem + privkey.pem for mqtt.serpis.id
      - ./mosquitto/data:/mosquitto/data
    networks:
      - web

networks:
  web:
    external: true
    # CHANGE THIS to the network serpis's Caddy container is attached to. Find it:
    #   docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' <caddy-container>
    name: web
