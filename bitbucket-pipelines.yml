# CI/CD for humid-server: build the Next.js image, push to GHCR, deploy to the VPS.
#
# Required repository variables (Repository settings > Repository variables; mark
# the secrets as "Secured"):
#   GHCR_USERNAME                      e.g. wirawansanusi
#   GHCR_TOKEN                         GitHub PAT with write:packages, read:packages
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY  pk_live_... (baked into the client bundle)
#   VPS_HOST                           the server's host/IP
#   VPS_USER                           the deploy user on the server
#
# Also add the deploy SSH key under Repository settings > SSH keys, and add the
# VPS to "Known hosts" there (so StrictHostKeyChecking passes).

image: atlassian/default-image:4

definitions:
  steps:
    - step: &build-push-deploy
        name: Build, push to GHCR, deploy
        services:
          - docker
        caches:
          - docker
        script:
          - export IMAGE=ghcr.io/wirawansanusi/humid-server
          # Build — NEXT_PUBLIC_* baked in; server secrets stay runtime-only (compose).
          - >
            docker build
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            -t "$IMAGE:latest" -t "$IMAGE:$BITBUCKET_COMMIT" .
          # Push to GHCR.
          - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          - docker push "$IMAGE:latest"
          - docker push "$IMAGE:$BITBUCKET_COMMIT"
          # Deploy: the VPS already authenticates to GHCR (shared with serpis), so
          # just pull the new image and restart. Compose lives in /opt/humid-server.
          - >
            ssh -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST"
            "cd /opt/humid-server
            && docker compose pull app
            && docker compose up -d app
            && docker image prune -f"

pipelines:
  branches:
    main:
      - step: *build-push-deploy
